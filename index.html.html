<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRASA VEGANA | Premios de Lujo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<!-- SDK de Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
  :root { --bg: #030303; --surface: #121216; --accent-red: #ff1f1f; --accent-blue: #0066ff; --accent-cyan: #00f2ff; --text: #ffffff; --border: rgba(255, 255, 255, 0.1); --font-display: 'Oxanium', sans-serif; --font-body: 'Rajdhani', sans-serif; }
  * { box-sizing: border-box; scroll-behavior: smooth; }
  body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow-x: hidden; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .site-header { position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); height: 80px; display: flex; align-items: center; }
  .header-inner { display: flex; justify-content: space-between; align-items: center; width: 100%; }
  .logo { font-family: var(--font-display); font-weight: 800; font-size: 1.6rem; text-transform: uppercase; }
  .logo .blue { color: var(--accent-blue); }
  .logo .red { color: var(--accent-red); }
  .hero { min-height: 90vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle at center, #111 0%, #000 100%); padding: 40px 20px; }
  .hero h1 { font-family: var(--font-display); font-size: clamp(2.5rem, 8vw, 5.5rem); line-height: 1; margin: 0; text-transform: uppercase; font-weight: 800; }
  .gradient-text { background: linear-gradient(90deg, #00f2ff, #ff007a, #00f2ff); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: flow 5s linear infinite; }
  @keyframes flow { to { background-position: 200%; } }
  .btn-rocket { background: linear-gradient(90deg, #3b82f6, #ef4444); color: white; padding: 20px 45px; border-radius: 12px; font-family: var(--font-display); font-weight: 800; text-transform: uppercase; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3); }
  .grid-rifas { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 40px 0; }
  .card-rifa { background: var(--surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; }
  .card-content { padding: 20px; }
  .btn-jugar { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); font-family: var(--font-display); font-weight: 800; border-radius: 4px; cursor: pointer; }
  #smart-chat { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
  .chat-btn { width: 60px; height: 60px; background: linear-gradient(135deg, #0066ff, #00f2ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .chat-window { position: absolute; bottom: 85px; right: 0; width: 300px; background: #121216; border: 1px solid var(--accent-blue); border-radius: 15px; display: none; flex-direction: column; overflow: hidden; height: 400px; }
  .chat-body { padding: 15px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #0a0a0c; font-size: 0.9rem; }
  .msg.bot { background: #1a1a22; padding: 10px; border-radius: 10px; border-left: 3px solid var(--accent-cyan); }
  .msg.user { background: var(--accent-blue); padding: 10px; border-radius: 10px; align-self: flex-end; }
  .admin-btn { background: none; border: none; color: #222; font-size: 0.7rem; cursor: pointer; }
</style>
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <div class="logo"><span class="blue">GRASA</span> <span class="red">VEGANA</span></div>
    <button class="admin-btn" onclick="checkAdmin()">Admin</button>
  </div>
</header>

<main>
  <section class="hero">
    <h1><span style="color:#fff">DEJA DE SOÑARLO,</span><br><span class="gradient-text">PORQUE AQUÍ SE GANA</span></h1>
    <p style="color:#888; margin: 20px 0;">Sorteos reales en República Dominicana.</p>
    <button class="btn-rocket" onclick="document.getElementById('rifas').scrollIntoView()">¡QUIERO MI PREMIO!</button>
  </section>

  <section id="rifas" class="container" style="padding: 60px 0;">
    <div class="grid-rifas" id="rifasGrid"></div>
  </section>

  <section id="comprar" class="container" style="display:none; padding: 40px 0;">
    <div style="background:var(--surface); padding:30px; border-radius:15px; border:1px solid var(--accent-blue);">
      <h2 id="buyTitle">Confirmar Participación</h2>
      <input type="text" id="userName" placeholder="Nombre completo" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff;">
      <input type="tel" id="userPhone" placeholder="WhatsApp (Ej: 8090000000)" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff;">
      <button class="btn-jugar" style="background:var(--accent-red); color:white; border:none;" onclick="processPurchase()">CONFIRMAR POR WHATSAPP</button>
    </div>
  </section>
</main>

<div id="smart-chat">
  <div class="chat-window" id="chatWin">
    <div style="background:var(--accent-blue); padding:10px; font-weight:800; display:flex; justify-content:space-between;"><span>GRASA BOT 🤖</span><button onclick="toggleChat()" style="background:none; border:none; color:#fff;">✕</button></div>
    <div class="chat-body" id="chatBody"><div class="msg bot">¡Hola! ¿Qué máquina quieres ganar hoy?</div></div>
  </div>
  <div class="chat-btn" onclick="toggleChat()">💬</div>
</div>

<script>
/* CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyD41pg4hYghW325qF6haI_au00-rWf4eU4",
  authDomain: "grasavegana.firebaseapp.com",
  databaseURL: "https://grasavegana-default-rtdb.firebaseio.com",
  projectId: "grasavegana",
  storageBucket: "grasavegana.appspot.com",
  messagingSenderId: "1017844496464",
  appId: "1:1017844496464:web:53bd0771b5cbb2efe23955"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const RAFFLES = [
  { id:1, name:'MAZDA CX30 2021', price:100, img:'https://images.unsplash.com/photo-1583121274602-3e2820c69888?w=800' },
  { id:2, name:'BMW M4 o KIA SPORTAGE', price:150, img:'https://images.unsplash.com/photo-1555215695-3004980ad54e?w=800' },
  { id:3, name:'KTM 690 + RD$ 100,000', price:200, img:'https://images.unsplash.com/photo-1591637333184-19aa84b3e01f?w=800' }
];

let selected = null;
function render() {
  document.getElementById('rifasGrid').innerHTML = RAFFLES.map(r => `
    <div class="card-rifa"><div style="height:180px; background-image:url('${r.img}'); background-size:cover;"></div>
    <div class="card-content"><h3>${r.name}</h3><p>RD$ ${r.price}</p><button class="btn-jugar" onclick="openBuy(${r.id})">JUGAR</button></div></div>`).join('');
}
function openBuy(id) { selected = RAFFLES.find(r=>r.id===id); document.getElementById('comprar').style.display='block'; document.getElementById('buyTitle').innerText = "Rifa: " + selected.name; window.scrollTo(0, document.getElementById('comprar').offsetTop - 100); }

function processPurchase() {
  const name = document.getElementById('userName').value;
  const phone = document.getElementById('userPhone').value.replace(/\D/g,'');
  if(!name || !phone) return alert("Llena los datos");
  const ticket = Math.floor(1000 + Math.random() * 9000);
  db.ref('ventas/' + phone).push({ name, raffle: selected.name, ticket, status: 'pendiente' }).then(() => {
    const msg = `¡Hola! Compré boleto para ${selected.name}. Nombre: ${name}. Mi número: ${ticket}`;
    window.open(`https://wa.me/18093634222?text=${encodeURIComponent(msg)}`, '_blank');
  });
}
function toggleChat() { const w = document.getElementById('chatWin'); w.style.display = w.style.display === 'flex' ? 'none' : 'flex'; }
function checkAdmin() { if(prompt("Pass:") === "1234") alert("Entrando al sistema..."); }
render();
</script>
</body>
</html>
