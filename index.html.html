<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRASA VEGANA | Premios de Lujo RD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<!-- SCRIPTS DE FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
  :root {
    --bg: #030303;
    --surface: #121216;
    --accent-red: #ff1f1f;
    --accent-blue: #0066ff;
    --accent-cyan: #00f2ff;
    --text: #ffffff;
    --border: rgba(255, 255, 255, 0.1);
    --font-display: 'Oxanium', sans-serif;
    --font-body: 'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; scroll-behavior: smooth; }
  body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow-x: hidden; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  
  /* HEADER */
  .site-header { position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); height: 80px; display: flex; align-items: center; }
  .header-inner { display: flex; justify-content: space-between; align-items: center; width: 100%; }
  .logo { font-family: var(--font-display); font-weight: 800; font-size: 1.6rem; text-transform: uppercase; }
  .logo .blue { color: var(--accent-blue); }
  .logo .red { color: var(--accent-red); }

  /* HERO */
  .hero { min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle at center, #111 0%, #000 100%); padding: 40px 20px; }
  .hero h1 { font-family: var(--font-display); font-size: clamp(2.5rem, 8vw, 5rem); line-height: 1; margin: 0; text-transform: uppercase; font-weight: 800; }
  .gradient-text { background: linear-gradient(90deg, #00f2ff, #ff007a, #00f2ff); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: flow 5s linear infinite; }
  @keyframes flow { to { background-position: 200%; } }
  .btn-rocket { background: linear-gradient(90deg, #3b82f6, #ef4444); color: white; padding: 18px 40px; border-radius: 12px; font-family: var(--font-display); font-weight: 800; text-transform: uppercase; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3); margin-top: 30px; }

  /* CATALOGO */
  .grid-rifas { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 40px 0; }
  .card-rifa { background: var(--surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; }
  .card-image { width: 100%; height: 200px; background-size: cover; background-position: center; }
  .card-content { padding: 20px; }
  .btn-jugar { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); font-family: var(--font-display); font-weight: 800; border-radius: 4px; cursor: pointer; transition: 0.3s; }
  .btn-jugar:hover { background: var(--accent-cyan); color: #000; }

  /* CHAT INTELIGENTE */
  #smart-chat { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
  .chat-btn { width: 60px; height: 60px; background: linear-gradient(135deg, #0066ff, #00f2ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 20px rgba(0,242,255,0.4); }
  .chat-window { position: absolute; bottom: 80px; right: 0; width: 300px; background: #121216; border: 1px solid var(--accent-blue); border-radius: 15px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
  .chat-header { background: var(--accent-blue); padding: 12px; font-weight: 800; color: #fff; font-family: var(--font-display); display: flex; justify-content: space-between; }
  .chat-body { padding: 15px; height: 250px; overflow-y: auto; background: #0a0a0c; display: flex; flex-direction: column; gap: 10px; font-size: 0.9rem; }
  .msg { padding: 8px 12px; border-radius: 10px; max-width: 85%; }
  .msg.bot { background: #1a1a22; align-self: flex-start; border-left: 3px solid var(--accent-cyan); }
  .msg.user { background: var(--accent-blue); align-self: flex-end; }
  .chat-footer { padding: 10px; display: flex; gap: 5px; border-top: 1px solid var(--border); }
  .chat-footer input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 5px; }

  /* ADMIN Oculto */
  .admin-trigger { background: none; border: none; color: #111; font-size: 0.6rem; cursor: pointer; }
</style>
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <div class="logo"><span class="blue">GRASA</span> <span class="red">VEGANA</span></div>
    <button class="admin-trigger" onclick="checkAdmin()">Admin</button>
  </div>
</header>

<main>
  <section class="hero">
    <div style="border: 1px solid var(--accent-cyan); padding: 5px 15px; border-radius: 50px; font-size: 0.7rem; color: var(--accent-cyan); margin-bottom: 20px; letter-spacing: 2px;">⚡ PROCESO 100% VERIFICADO ⚡</div>
    <h1><span style="color:#fff">DEJA DE SOÑARLO,</span><br><span class="gradient-text">PORQUE AQUÍ SE GANA</span></h1>
    <p style="color:#888; margin-top: 20px; font-size: 1.1rem;">La plataforma de rifas más real de República Dominicana.</p>
    <button class="btn-rocket" onclick="document.getElementById('rifas').scrollIntoView()">¡Ver Rifas Activas!</button>
  </section>

  <section id="rifas" class="container" style="padding: 60px 0;">
    <h2 style="font-family: var(--font-display); text-transform: uppercase;">Rifas <span style="color:var(--accent-cyan)">Activas</span></h2>
    <div class="grid-rifas" id="rifasGrid"></div>
  </section>

  <section id="comprar" class="container" style="display:none; padding-bottom: 100px;">
    <div style="background:var(--surface); padding:30px; border-radius:15px; border: 1px solid var(--accent-blue);">
        <h2 id="buyTitle" style="font-family: var(--font-display);">Asegura tus boletos</h2>
        <input type="text" id="userName" placeholder="Nombre Completo">
        <input type="tel" id="userPhone" placeholder="WhatsApp (809-000-0000)">
        <button class="btn-jugar" style="background: var(--accent-red); color: #fff; border: none; margin-top: 20px;" onclick="confirmarWhatsApp()">CONFIRMAR POR WHATSAPP</button>
    </div>
  </section>
</main>

<div id="smart-chat">
  <div class="chat-window" id="chatWin">
    <div class="chat-header"><span>GRASA BOT 🤖</span><button onclick="toggleChat()" style="background:none; border:none; color:#fff; cursor:pointer;">✕</button></div>
    <div class="chat-body" id="chatBody">
      <div class="msg bot">¡Hola! Soy el asistente de Grasa Vegana. 🇩🇴 ¿En qué máquina quieres montar hoy?</div>
    </div>
    <div class="chat-footer">
      <input type="text" id="chatInput" placeholder="Escribe..." onkeypress="if(event.key=='Enter') sendMessage()">
      <button onclick="sendMessage()" style="background:var(--accent-blue); border:none; color:#fff; border-radius:5px; padding:5px 10px;">➤</button>
    </div>
  </div>
  <div class="chat-btn" onclick="toggleChat()">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
  </div>
</div>

<script>
// CONFIGURACIÓN DE TU FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyD41pg4hYghW325qF6haI_au00-rWf4eU4",
  authDomain: "grasavegana.firebaseapp.com",
  databaseURL: "https://grasavegana-default-rtdb.firebaseio.com",
  projectId: "grasavegana",
  storageBucket: "grasavegana.appspot.com",
  messagingSenderId: "1017844496464",
  appId: "1:1017844496464:web:53bd0771b5cbb2efe23955"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const RAFFLES = [
  { id:1, name:'MAZDA CX30 2021', price:100, sold:28, img:'https://images.unsplash.com/photo-1583121274602-3e2820c69888?w=800' },
  { id:2, name:'BMW M4 o KIA SPORTAGE', price:150, sold:64, img:'https://images.unsplash.com/photo-1555215695-3004980ad54e?w=800' },
  { id:3, name:'KTM 690 + RD$ 100,000', price:200, sold:15, img:'https://images.unsplash.com/photo-1591637333184-19aa84b3e01f?w=800' }
];

function render() {
  document.getElementById('rifasGrid').innerHTML = RAFFLES.map(r => `
    <div class="card-rifa">
      <div class="card-image" style="background-image: url('${r.img}')"></div>
      <div class="card-content">
        <h3>${r.name}</h3>
        <p style="color:var(--accent-cyan); font-weight:800;">RD$ ${r.price}</p>
        <button class="btn-jugar" onclick="openBuy(${r.id})">JUGAR</button>
      </div>
    </div>
  `).join('');
}

let selected = null;
function openBuy(id) {
  selected = RAFFLES.find(r => r.id === id);
  document.getElementById('comprar').style.display = 'block';
  document.getElementById('buyTitle').innerText = "Participando por: " + selected.name;
  window.scrollTo(0, document.getElementById('comprar').offsetTop - 100);
}

function confirmarWhatsApp() {
  const name = document.getElementById('userName').value;
  const phone = document.getElementById('userPhone').value.replace(/\D/g,'');
  if(!name || phone.length < 10) return alert("Por favor completa tus datos correctamente.");
  
  const ticket = Math.floor(1000 + Math.random() * 9000);
  db.ref('ventas/' + phone).push({ name, raffle: selected.name, ticket, status: 'pendiente', date: new Date().toLocaleString() }).then(() => {
    const msg = `¡Hola Grasa Vegana! Compré un boleto para ${selected.name}. Mi nombre es ${name}. Mi número generado es: ${ticket}`;
    window.open(`https://wa.me/18093634222?text=${encodeURIComponent(msg)}`, '_blank');
  });
}

function toggleChat() {
  const win = document.getElementById('chatWin');
  win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const body = document.getElementById('chatBody');
  if(!input.value.trim()) return;
  
  body.innerHTML += `<div class="msg user">${input.value}</div>`;
  const txt = input.value.toLowerCase();
  input.value = "";
  
  setTimeout(() => {
    let r = "No entiendo muy bien, pero puedes escribirnos al WhatsApp 809-363-4222.";
    if(txt.includes("hola")) r = "¡Hola! ¿Listo para ganar una de nuestras máquinas?";
    if(txt.includes("pago") || txt.includes("cuenta")) r = "Aceptamos Popular, BHD y Banreservas. Al darle a comprar verás las opciones.";
    if(txt.includes("rifa")) r = "Tenemos un Mazda CX30, un BMW M4 y una KTM 690. ¿Cuál te gusta?";
    body.innerHTML += `<div class="msg bot">${r}</div>`;
    body.scrollTop = body.scrollHeight;
  }, 1000);
}

function checkAdmin() {
  if(prompt("Clave:") === "1234") alert("Bienvenido al sistema.");
}

render();
</script>
</body>
</html>
